name: Build and push (src) image to ACR

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build (context = src/)
        working-directory: src
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"
          docker build -f Dockerfile -t "$IMAGE" .

      - name: Push
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"
          docker push "$IMAGE"

      - name: Tag + push latest (optional)
        run: |
          SRC_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.IMAGE_NAME }}:latest"
          docker tag "$SRC_IMAGE" "$LATEST_IMAGE"
          docker push "$LATEST_IMAGE"
